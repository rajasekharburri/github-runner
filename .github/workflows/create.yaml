name: create runner

on: workflow_dispatch

jobs:
  create-runner:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4          # v6 doesn't exist, latest is v4

      - name: list files
        run: ls -l

      - name: setup terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4   # v6.1.0 doesn't exist, latest is v4
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: terraform init
        run: terraform init

      - name: terraform plan
        run: terraform plan

      - name: terraform apply
        run: terraform apply -auto-approve